<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>S-Doorbell — Tocar Timbre</title>
  <meta name="description" content="Timbre digital inteligente" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Open Graph -->
  <meta property="og:title" content="S-Doorbell" />
  <meta property="og:description" content="Toca el timbre digital" />
  <meta property="og:type" content="website" />

  <style>
    :root {
      --blue: #007AFF;
      --blue-dark: #0056CC;
      --blue-glow: rgba(0, 122, 255, 0.35);
      --success: #34C759;
      --error: #FF3B30;
      --white: #FFFFFF;
      --gray-400: #8E8E93;
      --gray-600: #48484A;
      --gray-800: #2C2C2E;
      --gray-900: #1C1C1E;
      --black: #000000;
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: var(--font);
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    /* Ambient glow effects */
    .glow-top {
      position: fixed; top: -100px; left: 50%;
      transform: translateX(-50%);
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,122,255,0.15) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .glow-bottom {
      position: fixed; bottom: -150px; right: -100px;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,122,255,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .page-content {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
    }

    /* Brand header */
    .brand {
      display: flex; align-items: center; gap: 10px;
      opacity: 0; animation: fadeDown 0.6s ease forwards;
    }
    .brand-icon { font-size: 24px; }
    .brand-name {
      font-size: 18px; font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--white), rgba(255,255,255,0.7));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* House card */
    .house-card {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      overflow: hidden;
      opacity: 0; animation: fadeUp 0.6s ease 0.2s forwards;
    }

    .house-photo {
      width: 100%; height: 180px;
      object-fit: cover; display: block;
      background: rgba(0,122,255,0.1);
    }

    .house-photo-placeholder {
      width: 100%; height: 180px;
      background: linear-gradient(135deg, rgba(0,122,255,0.15), rgba(0,86,204,0.08));
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
    }
    .house-photo-placeholder-icon { font-size: 48px; }
    .house-photo-placeholder-text { color: var(--gray-400); font-size: 13px; }

    .house-info { padding: 20px; }
    .house-owner { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .house-address { font-size: 14px; color: var(--gray-400); margin-top: 6px; }

    /* Visitor name input */
    .name-section {
      width: 100%;
      opacity: 0; animation: fadeUp 0.6s ease 0.35s forwards;
    }
    .name-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
      color: var(--gray-400); text-transform: uppercase;
      margin-bottom: 8px; display: block;
    }
    .name-input {
      width: 100%; height: 52px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      color: var(--white); font-size: 16px;
      padding: 0 16px; outline: none;
      font-family: var(--font);
      transition: border-color 0.2s;
    }
    .name-input::placeholder { color: var(--gray-600); }
    .name-input:focus { border-color: rgba(0,122,255,0.5); }

    /* THE BUTTON */
    .ring-section {
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      opacity: 0; animation: fadeUp 0.6s ease 0.5s forwards;
    }

    .ring-btn-wrapper {
      position: relative;
      width: 200px; height: 200px;
    }

    .ring-btn-glow {
      position: absolute; inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--blue-glow) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .ring-btn {
      width: 200px; height: 200px;
      border-radius: 50%; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      position: relative; z-index: 1;
      box-shadow: 0 8px 32px rgba(0,122,255,0.4), 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s;
      -webkit-user-select: none; user-select: none;
    }

    .ring-btn:hover .ring-btn-glow { opacity: 1; }
    .ring-btn:active { transform: scale(0.93); box-shadow: 0 4px 16px rgba(0,122,255,0.3); }
    .ring-btn.ringing { transform: scale(0.95); opacity: 0.8; cursor: not-allowed; }
    .ring-btn.success { background: linear-gradient(135deg, var(--success), #27A24B); box-shadow: 0 8px 32px rgba(52,199,89,0.4); }

    .ring-btn-emoji { font-size: 52px; pointer-events: none; }
    .ring-btn-text {
      color: var(--white); font-size: 13px; font-weight: 900;
      letter-spacing: 1.5px; text-transform: uppercase;
      pointer-events: none;
    }

    .ring-hint { color: var(--gray-400); font-size: 13px; text-align: center; line-height: 1.5; }

    /* Status messages */
    .status-msg {
      width: 100%; padding: 14px 18px;
      border-radius: 16px; font-size: 14px; font-weight: 600;
      text-align: center; display: none;
      animation: fadeIn 0.3s ease;
    }
    .status-msg.show { display: block; }
    .status-msg.success { background: rgba(52,199,89,0.15); color: var(--success); border: 1px solid rgba(52,199,89,0.3); }
    .status-msg.error { background: rgba(255,59,48,0.15); color: var(--error); border: 1px solid rgba(255,59,48,0.3); }

    /* Loading spinner */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Error state */
    .error-page {
      text-align: center; opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }
    .error-icon { font-size: 64px; margin-bottom: 16px; }
    .error-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .error-text { color: var(--gray-400); font-size: 15px; }

    /* Footer */
    .footer {
      color: var(--gray-600); font-size: 12px; text-align: center;
      opacity: 0; animation: fadeUp 0.6s ease 0.7s forwards;
    }
    .footer a { color: var(--blue); text-decoration: none; }

    /* Loading state */
    .loading-state { text-align: center; opacity: 0; animation: fadeIn 0.4s ease forwards; }
    .loading-title { font-size: 16px; color: var(--gray-400); margin-top: 16px; }

    /* Animations */
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: none; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes ring { 0%,100% { transform: rotate(0); } 20% { transform: rotate(15deg); } 40% { transform: rotate(-15deg); } 60% { transform: rotate(10deg); } 80% { transform: rotate(-10deg); } }
    .ring-anim { animation: ring 0.5s ease; }

    @media (max-width: 380px) {
      .ring-btn, .ring-btn-wrapper { width: 170px; height: 170px; }
      .ring-btn-emoji { font-size: 42px; }
    }

    /* ─── Botón secundario videollamada ─────────────────────────────────── */
    .video-btn {
      width: 100%; height: 54px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: rgba(0,122,255,0.12);
      border: 1px solid rgba(0,122,255,0.4);
      border-radius: 14px; color: var(--white);
      font-size: 15px; font-weight: 700; font-family: var(--font);
      cursor: pointer; transition: background 0.2s, transform 0.1s;
      -webkit-user-select: none; user-select: none;
    }
    .video-btn:hover { background: rgba(0,122,255,0.2); }
    .video-btn:active { transform: scale(0.97); }
    .video-btn-icon { font-size: 20px; }

    /* ─── Pantalla de videollamada ──────────────────────────────────────── */
    .call-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--black);
      display: none; flex-direction: column;
    }
    .call-overlay.show { display: flex; }

    .call-remote {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; background: var(--gray-900);
    }
    .call-local {
      position: absolute; top: 20px; right: 16px; z-index: 3;
      width: 110px; height: 150px;
      object-fit: cover; border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.5);
      background: var(--gray-800);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      transform: scaleX(-1); /* espejo de cámara frontal */
    }

    .call-topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 2;
      padding: 24px 20px 40px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      text-align: center;
    }
    .call-title { font-size: 18px; font-weight: 800; }
    .call-status {
      margin-top: 6px; font-size: 13px; color: var(--gray-400);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .call-status .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success); display: inline-block;
    }
    .call-status.calling .dot { background: #FFCC00; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.3; } }

    .call-center {
      position: absolute; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      text-align: center; padding: 24px;
    }
    .call-center .spinner { margin: 0 auto; }
    .call-center-text { color: var(--gray-400); font-size: 15px; }

    .call-controls {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
      padding: 24px 24px 40px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      display: flex; align-items: center; justify-content: center; gap: 28px;
    }
    .call-ctrl {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      background: none; border: none; color: var(--white);
      font-size: 11px; font-family: var(--font); cursor: pointer;
    }
    .call-ctrl-icon {
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; transition: background 0.2s, transform 0.1s;
    }
    .call-ctrl:active .call-ctrl-icon { transform: scale(0.92); }
    .call-ctrl.off .call-ctrl-icon { background: rgba(255,255,255,0.4); }
    .call-ctrl.hangup .call-ctrl-icon { background: var(--error); width: 68px; height: 68px; }
  </style>
</head>
<body>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>
  <div id="app">
    <div class="page-content">
      <div id="loading-state" class="loading-state">
        <div class="spinner" style="margin: 0 auto;"></div>
        <p class="loading-title">Cargando timbre...</p>
        <p class="loading-title" id="watchdog-msg" style="display:none; font-size:14px; color:#8E8E93; margin-top:16px;"></p>
      </div>
    </div>
  </div>

  <!-- ─── Pantalla de videollamada ─── -->
  <div class="call-overlay" id="call-overlay">
    <video class="call-remote" id="remote-video" autoplay playsinline></video>
    <video class="call-local" id="local-video" autoplay playsinline muted></video>

    <div class="call-topbar">
      <div class="call-title">Videollamada</div>
      <div class="call-status calling" id="call-status">
        <span class="dot"></span><span id="call-status-text">Llamando…</span>
      </div>
    </div>

    <div class="call-center" id="call-center">
      <div class="spinner"></div>
      <p class="call-center-text" id="call-center-text">Esperando que atiendan…</p>
    </div>

    <div class="call-controls">
      <button class="call-ctrl" id="ctrl-mic" onclick="toggleMic()">
        <span class="call-ctrl-icon">🎤</span><span>Silenciar</span>
      </button>
      <button class="call-ctrl hangup" onclick="hangupCall()">
        <span class="call-ctrl-icon">📵</span><span>Finalizar</span>
      </button>
      <button class="call-ctrl" id="ctrl-cam" onclick="switchCamera()">
        <span class="call-ctrl-icon">🔄</span><span>Cámara</span>
      </button>
    </div>
  </div>

  <!--
    VIGÍA. Bloque separado y en ES5 estricto: si el bloque principal de JS no
    parsea (un token que este navegador no entiende tumba el archivo entero, sin
    error visible), la página se quedaría en "Cargando timbre..." para siempre.
    Esto detecta ese caso y al menos le dice al visitante qué pasa.
    NO usar sintaxis moderna acá adentro. Es la última línea de defensa.
  -->
  <script>
    (function () {
      // ── DIAGNÓSTICO TEMPORAL (v4) ──────────────────────────────────────────
      // Pinta el estado en la propia pantalla del visitante, para saber en un
      // teléfono real: (1) si este JS corre, (2) si el bloque principal parsea,
      // (3) qué error salta. Se saca cuando terminemos de diagnosticar.
      function diag(txt, color) {
        var m = document.getElementById('watchdog-msg');
        if (!m) return;
        m.style.display = 'block';
        if (color) m.style.color = color;
        m.innerHTML = txt;
      }
      // (1) Si ves esto, el JavaScript SÍ corre en este teléfono.
      diag('diagnóstico v4: JavaScript OK, cargando datos…', '#8E8E93');

      // (3) Cualquier error de parseo o ejecución de OTROS scripts cae acá.
      window.onerror = function (msg, url, line, col) {
        diag('ERROR en la página:<br>' + msg + '<br>(línea ' + line + ':' + col + ')', '#FF6B6B');
        return false;
      };

      var t = setTimeout(function () {
        var loading = document.getElementById('loading-state');
        if (!loading || loading.style.display === 'none') return; // ya cargó
        diag('Tarda más de lo normal. Si ves esto, el JS corre pero no llegan ' +
          'los datos del servidor.', '#FFA500');
      }, 10000);
      window.__cancelWatchdog = function () { clearTimeout(t); };
    })();
  </script>
