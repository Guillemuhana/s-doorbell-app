<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- viewport-fit=cover + safe-area = la app usa toda la pantalla del iPhone,
         sin barras blancas arriba/abajo cuando corre desde el home screen. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover, user-scalable=no"
    />
    <title>S-Doorbell</title>
    <meta name="description" content="Tu timbre digital: recibí a tus visitantes desde el celular." />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2E9BE0" />

    <!-- iOS no lee el manifest para esto: necesita sus propios meta. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="S-Doorbell" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
        /* Evita el rebote elástico de Safari, que en standalone se ve como un bug. */
        overscroll-behavior-y: none;
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>Necesitás habilitar JavaScript para usar S-Doorbell.</noscript>
    <div id="root"></div>
    <script>
      // El SW solo tiene sentido en contexto seguro (https o localhost).
      // Auto-actualización: al detectar un SW nuevo instalado, recargamos una
      // sola vez para tomar el deploy nuevo. Sin esto, iOS queda clavado en la
      // versión vieja hasta que el usuario borra la app a mano.
      if ('serviceWorker' in navigator) {
        var yaRecargo = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (yaRecargo) return;
          yaRecargo = true;
          window.location.reload();
        });
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').then(function (reg) {
            // Chequear si hay versión nueva apenas carga y cada vez que vuelve
            // a foco (clave en el PWA de iOS, que no chequea solo).
            reg.update();
            document.addEventListener('visibilitychange', function () {
              if (document.visibilityState === 'visible') reg.update();
            });
            reg.addEventListener('updatefound', function () {
              var nuevo = reg.installing;
              if (!nuevo) return;
              nuevo.addEventListener('statechange', function () {
                // Hay un SW nuevo instalado y ya había uno controlando: el
                // controllerchange (por skipWaiting) disparará la recarga.
                if (nuevo.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('S-Doorbell: versión nueva disponible, actualizando…');
                }
              });
            });
          }).catch(function (err) {
            console.warn('SW no registrado:', err);
          });
        });
      }
    </script>
  </body>
</html>
